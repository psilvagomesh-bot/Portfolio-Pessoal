    <main>
        <div class="contato-wrapper">

            <section class="contato" aria-labelledby="titulo-contato">
                <h2 id="titulo-contato">Entre em Contato</h2>

                <form id="formContato" novalidate>

                    <div class="campo-form">
                        <label class="caixa-label" for="Nome">Nome</label>
                        <input type="text" id="Nome" name="nome"
                               placeholder="Digite seu nome"
                               class="caixa-nome"
                               required
                               minlength="2"
                               maxlength="100"
                               autocomplete="name">
                        <span class="erro-campo" aria-live="polite"></span>
                    </div>

                    <div class="campo-form">
                        <label class="caixa-label" for="Email">E-mail</label>
                        <input type="email" id="Email" name="email"
                               placeholder="Digite seu e-mail"
                               class="caixa-nome"
                               required
                               maxlength="254"
                               autocomplete="email">
                        <span class="erro-campo" aria-live="polite"></span>
                    </div>

                    <div class="campo-form">
                        <label class="caixa-label" for="Mensagem">Mensagem</label>
                        <textarea id="Mensagem" name="mensagem"
                                  rows="5"
                                  class="caixa-nome"
                                  required
                                  minlength="10"
                                  maxlength="1000"
                                  placeholder="Escreva sua mensagem aqui..."></textarea>
                        <span class="erro-campo" aria-live="polite"></span>
                    </div>

                    <button type="submit" class="botao-form" id="btn-form">Enviar Mensagem</button>

                    <p class="aviso-privacidade">
                        Suas informações são usadas apenas para responder à sua mensagem e não serão
                        compartilhadas com terceiros.
                    </p>

                </form>
            </section>
